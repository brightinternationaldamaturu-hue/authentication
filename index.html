<!DOCTYPE html>
<html>
<head>
  <title>BIVA Network Login</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>
    body{
      font-family:Poppins;
      background:#fff5f5;
      text-align:center;
      padding:40px;
    }

    input{
      padding:12px;
      width:90%;
      margin:10px 0;
    }

    button{
      padding:12px;
      background:#ff1a1a;
      color:#fff;
      border:none;
      width:95%;
      font-weight:bold;
      cursor:pointer;
    }
  </style>
</head>
<body>

<h2>🌐 Connect to BIVA Network</h2>

<input id="voucher" placeholder="Enter Voucher Code">
<button onclick="loginWithVoucher()">Connect</button>
<p id="status"></p>

<script>

// 🔍 SHOW FULL URL FOR DEBUG
console.log("FULL URL:", window.location.href);

// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDaZH5kn_mmxap3jOyw3Yhq55d936Jhl0g",
  authDomain: "biva-system.firebaseapp.com",
  projectId: "biva-system"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();


// 🔥 GET OMADA PARAMETERS (ROBUST)
function getParams(){
  const p = new URLSearchParams(window.location.search);

  return {
    clientMac: p.get("clientMac") || p.get("mac"),
    apMac: p.get("apMac") || p.get("ap"),
    ssid: p.get("ssidName") || p.get("ssid"),
    token: p.get("token") || p.get("t") || p.get("authToken"),
    redirectUrl: p.get("redirectUrl") || p.get("url") || p.get("u"),
    clientIp: p.get("clientIp") || p.get("ip"),
    site: p.get("site")
  };
}


// 🚀 MAIN LOGIN FUNCTION
async function loginWithVoucher() {

  try {

    const status = document.getElementById("status");
    const code = document.getElementById("voucher").value.trim().toUpperCase();

    if (!code) {
      status.innerText = "Enter voucher";
      return;
    }

    status.innerText = "Checking voucher...";

    // 🔍 FIND VOUCHER
    const snapshot = await db
      .collection("vouchers")
      .where("code", "==", code)
      .limit(1)
      .get();

    if (snapshot.empty) {
      throw new Error("Invalid voucher");
    }

    const doc = snapshot.docs[0];
    const ref = doc.ref;
    const data = doc.data();

    if (data.used) {
      throw new Error("Voucher already used");
    }

    // ✅ MARK USED
    await ref.update({
      used: true,
      usedAt: new Date()
    });

    // 🔍 GET OMADA PARAMS
    const omada = getParams();

    console.log("OMADA PARAMS:", omada);

    // SAVE SESSION (optional but good)
    await db.collection("voucher_sessions").add({
      voucher: code,
      clientMac: omada.clientMac,
      apMac: omada.apMac,
      ssid: omada.ssid,
      timestamp: new Date()
    });

    status.innerText = "✅ Voucher accepted... Connecting";

    // 🔥 HANDLE OMADA AUTH
    setTimeout(() => {

      // ❌ NOT FROM OMADA (TEST MODE)
      if (!omada.clientMac || !omada.apMac || !omada.token) {
        status.innerText = "⚠️ Not from Wi-Fi portal (Test mode)";
        return;
      }

      // ✅ OPTION 1: USE redirectUrl (BEST)
      if (omada.redirectUrl) {
        console.log("Using redirectUrl:", omada.redirectUrl);
        window.location.href = decodeURIComponent(omada.redirectUrl);
        return;
      }

      // ✅ OPTION 2: FALLBACK TO MANUAL AUTH
      const authUrl =
        `http://192.168.1.1:8088/portal/auth` +
        `?clientMac=${encodeURIComponent(omada.clientMac)}` +
        `&apMac=${encodeURIComponent(omada.apMac)}` +
        `&ssid=${encodeURIComponent(omada.ssid || "")}` +
        `&token=${encodeURIComponent(omada.token)}`;

      console.log("Fallback auth URL:", authUrl);

      window.location.href = authUrl;

    }, 1200);

  } catch (err) {
    document.getElementById("status").innerText = err.message;
    console.log("ERROR:", err);
  }
}

</script>

</body>
</html>
