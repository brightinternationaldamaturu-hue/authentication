<!DOCTYPE html>
<html>
<head>
  <title>BIVA Network Login</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>
    body{
      font-family:Poppins;
      background:#fff5f5;
      text-align:center;
      padding:40px;
    }

    input{
      padding:12px;
      width:90%;
      margin:10px 0;
    }

    button{
      padding:12px;
      background:#ff1a1a;
      color:#fff;
      border:none;
      width:95%;
      font-weight:bold;
      cursor:pointer;
    }
  </style>
</head>
<body>

<h2>🌐 Connect to BIVA Network</h2>

<input id="voucher" placeholder="Enter Voucher Code">
<button onclick="loginWithVoucher()">Connect</button>
<p id="status"></p>

<p id="status"></p>

<script>

async function loginWithVoucher(){
  const code = document.getElementById("voucher").value.trim();

  if(!code){
    document.getElementById("status").innerText = "Enter voucher";
    return;
  }

  const params = new URLSearchParams(window.location.search);

  try{
    const ref = db.collection("vouchers").doc(code);
    const doc = await ref.get();

    if(!doc.exists){
      throw new Error("Invalid voucher");
    }

    const data = doc.data();

    if(data.used){
      throw new Error("Voucher already used");
    }

    // ✅ MARK AS USED
    await ref.update({
      used: true,
      usedAt: new Date()
    });

    // ✅ SAVE SESSION
    await db.collection("voucher_sessions").add({
      voucher: code,
      clientMac: params.get("clientMac"),
      apMac: params.get("apMac"),
      ssid: params.get("ssid"),
      timestamp: new Date()
    });

    document.getElementById("status").innerText = "✅ Connected...";

    // 🔥 REDIRECT BACK TO INTERNET
    setTimeout(()=>{
      window.location.href = "http://connectivitycheck.gstatic.com/generate_204";
    },1500);

  }catch(err){
    document.getElementById("status").innerText = err.message;
  }
}


const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "biva-system.firebaseapp.com",
  projectId: "biva-system"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

function getParams(){
  const p = new URLSearchParams(window.location.search);
  return {
    clientMac: p.get("clientMac"),
    apMac: p.get("apMac"),
    ssid: p.get("ssid"),
    cliToken: p.get("token") || p.get("cliToken")
  };
}

async function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try{
    const res = await auth.signInWithEmailAndPassword(email, password);
    const user = res.user;

    const params = getParams();

    // ✅ SAVE SESSION TO FIREBASE
    await db.collection("users")
      .doc(user.uid)
      .collection("omada_sessions")
      .add({
        email: user.email,
        clientMac: params.clientMac,
        apMac: params.apMac,
        ssid: params.ssid,
        cliToken: params.cliToken,
        timestamp: new Date()
      });

    document.getElementById("status").innerText = "✅ Connected! Redirecting...";

    // 🔥 IMPORTANT: REDIRECT BACK TO INTERNET
    setTimeout(() => {
      window.location.href = "http://connectivitycheck.gstatic.com/generate_204";
    }, 1500);

  }catch(err){
    document.getElementById("status").innerText = err.message;
  }
}
</script>

</body>
</html>
